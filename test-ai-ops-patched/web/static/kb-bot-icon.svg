<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Robot head body - dark navy fill, accent stroke -->
  <rect x="18" y="46" width="64" height="46" rx="14" ry="14" fill="#1e2d4a" stroke="#38bdf8" stroke-width="3"/>
  <!-- Eyes -->
  <rect x="30" y="60" width="14" height="14" rx="4" fill="#38bdf8"/>
  <rect x="56" y="60" width="14" height="14" rx="4" fill="#38bdf8"/>
  <!-- Mouth bar -->
  <rect x="34" y="80" width="32" height="5" rx="2.5" fill="#38bdf8" opacity="0.5"/>
  <!-- Graduation cap board -->
  <ellipse cx="50" cy="36" rx="34" ry="8" fill="#38bdf8"/>
  <!-- Cap top -->
  <rect x="34" y="14" width="32" height="22" rx="4" ry="4" fill="#2563eb"/>
  <!-- Tassel string -->
  <line x1="84" y1="36" x2="84" y2="56" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="84" cy="58" r="3" fill="#38bdf8"/>
</svg>
